# Docker Compose configuration for Polymarket development environment
# This file orchestrates the backend API, worker, and PostgreSQL database services
# Build context is the project root to access both backend, worker, and shared packages

services:
  redis:
    image: redis:7-alpine
    container_name: polymarket-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - polymarket-network

  # PostgreSQL database service
  db:
    image: postgres:15-alpine
    container_name: polymarket-db
    command:
      - postgres
      - -c
      - log_min_error_statement=panic
    environment:
      # PostgreSQL configuration
      POSTGRES_DB: ${POSTGRES_DB:-polymarket_db}
      POSTGRES_USER: ${POSTGRES_USER:-polymarket_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-polymarket_password}
    volumes:
      # Persist database data across container restarts
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Map port 5432 to host for local development (optional)
      - "5432:5432"
    # Health check to verify database is ready
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-polymarket_user} -d ${POSTGRES_DB:-polymarket_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - polymarket-network

  # FastAPI backend service
  backend:
    build:
      context: .
      dockerfile: app/backend/Dockerfile
    container_name: polymarket-backend
    environment:
      # Database connection URL using service name 'db'
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-polymarket_user}:${POSTGRES_PASSWORD:-polymarket_password}@db:5432/${POSTGRES_DB:-polymarket_db}
      # Additional backend configuration
      BACKEND_MODE: ${BACKEND_MODE:-development}
      APP_NAME: ${APP_NAME:-Polymarket Paper Trading}
      S3_RAW_BUCKET: ${S3_RAW_BUCKET:-}
      S3_RAW_PREFIX: ${S3_RAW_PREFIX:-polymarket/raw}
      AWS_ENDPOINT: ${AWS_ENDPOINT:-}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      AWS_REGION: ${AWS_REGION:-eu-west-3}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      JWT_SECRET: ${JWT_SECRET:-change-me}
    ports:
      # Map backend API port to host
      - "8000:8000"
    # Only start backend after PostgreSQL is healthy
    depends_on:
      db:
        condition: service_healthy
    networks:
      - polymarket-network
    # Optional: mount code volume for live reload during development
    volumes:
      - ./app/backend:/app/app/backend
      - ./shared:/app/shared

  # Worker service for data ingestion
  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: polymarket-worker
    environment:
      # Database connection URL using service name 'db'
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-polymarket_user}:${POSTGRES_PASSWORD:-polymarket_password}@db:5432/${POSTGRES_DB:-polymarket_db}
      # Worker configuration
      BACKEND_MODE: ${BACKEND_MODE:-development}
      WORKER_CONSOLE_LOG_LEVEL: ${WORKER_CONSOLE_LOG_LEVEL:-INFO}
      WORKER_MODE: raw
      S3_RAW_BUCKET: ${S3_RAW_BUCKET}
      S3_RAW_PREFIX: ${S3_RAW_PREFIX:-polymarket/raw}
      AWS_ENDPOINT: ${AWS_ENDPOINT:-}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      AWS_REGION: ${AWS_REGION:-eu-west-3}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    # Start after PostgreSQL is healthy
    depends_on:
      db:
        condition: service_healthy
    networks:
      - polymarket-network
    # Optional: enable for development
    volumes:
      - ./worker:/app/worker
      - ./shared:/app/shared

  transform-worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: polymarket-transform-worker
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-polymarket_user}:${POSTGRES_PASSWORD:-polymarket_password}@db:5432/${POSTGRES_DB:-polymarket_db}
      WORKER_MODE: transform
      WORKER_CONSOLE_LOG_LEVEL: ${WORKER_CONSOLE_LOG_LEVEL:-INFO}
      S3_RAW_BUCKET: ${S3_RAW_BUCKET}
      S3_RAW_PREFIX: ${S3_RAW_PREFIX:-polymarket/raw}
      AWS_ENDPOINT: ${AWS_ENDPOINT:-}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      AWS_REGION: ${AWS_REGION:-eu-west-3}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      TRANSFORM_POLL_INTERVAL_SECONDS: ${TRANSFORM_POLL_INTERVAL_SECONDS:-20}
      TRANSFORM_BATCH_LIMIT: ${TRANSFORM_BATCH_LIMIT:-5}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - polymarket-network
    volumes:
      - ./worker:/app/worker
      - ./shared:/app/shared

  live-data-worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: polymarket-live-data-worker
    environment:
      WORKER_MODE: live_data
      WORKER_CONSOLE_LOG_LEVEL: ${WORKER_CONSOLE_LOG_LEVEL:-INFO}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_STREAM_KEY: ${REDIS_STREAM_KEY:-polymarket:market_stream}
      REDIS_JSON_KEY: ${REDIS_JSON_KEY:-polymarket:messages_json}
      REDIS_CONTROL_CHANNEL: ${REDIS_CONTROL_CHANNEL:-live-data-control}
      API_KEY: ${API_KEY:-}
      CLOB_WS_URL: ${CLOB_WS_URL:-wss://ws-subscriptions-clob.polymarket.com/ws/market}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - polymarket-network
    volumes:
      - ./worker:/app/worker
      - ./shared:/app/shared

  # Streamlit frontend service
  frontend:
    build:
      context: .
      dockerfile: app/frontend/Dockerfile
    container_name: polymarket-frontend
    environment:
      # Backend API URL for frontend to communicate with
      API_URL: http://backend:8000
      # Streamlit configuration
      STREAMLIT_ENV: ${STREAMLIT_ENV:-development}
      BACKEND_MODE: ${BACKEND_MODE:-mock}
    ports:
      # Map Streamlit port to host
      - "8501:8501"
    # Start after backend is available
    depends_on:
      - backend
    networks:
      - polymarket-network
    # Mount code volume for live reload during development
    volumes:
      - ./app/frontend:/app
      - ./shared:/app/shared
    # Streamlit command with appropriate configuration
    command: streamlit run main.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true

volumes:
  # Named volume for PostgreSQL data persistence
  postgres_data:

networks:
  # Custom network for inter-service communication
  polymarket-network:
    driver: bridge